<!DOCTYPE html>
<html>
<head>
  <title>Addition & Subtraction</title>
</head>
<body>
  <h2>JavaScript Program - Addition & Subtraction</h2>
  <script>
    
    function addNumbers(a, b) {
      return a + b;
    }

    function subtractNumbers(a, b) {
      return a - b;
    }

    
    let num1 = parseInt(prompt("Enter Number 1:"));
    let num2 = parseInt(prompt("Enter Number 2:"));

    
    let addition = addNumbers(num1, num2);
    let subtraction = subtractNumbers(num1, num2);

    
    document.write(`<p>Addition: ${num1} + ${num2} = ${addition}</p>`);
    document.write(`<p>Subtraction: ${num1} - ${num2} = ${subtraction}</p>`);
  </script>
</body>
</html>
