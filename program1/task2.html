<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
</head>
<body>
  <h2>Simple Calculator</h2>

  <label>Enter Number 1:</label>
  <input type="number" id="num1"><br><br>

  <label>Enter Number 2:</label>
  <input type="number" id="num2"><br><br>

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <script>
    function calculate() {
      let num1 = parseFloat(document.getElementById("num1").value);
      let num2 = parseFloat(document.getElementById("num2").value);
      let output = "";

      if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerHTML = "<p>Please enter valid numbers.</p>";
        return;
      }

      
      output += `<p>Addition: ${num1} + ${num2} = ${num1 + num2}</p>`;

      
      output += `<p>Subtraction: ${num1} - ${num2} = ${num1 - num2}</p>`;

      
      output += `<p>Multiplication: ${num1} * ${num2} = ${num1 * num2}</p>`;

      
      if (num2 === 0) {
        output += `<p style="color:red;">Division by zero is not allowed!</p>`;
      } else {
        output += `<p>Division: ${num1} ÷ ${num2} = ${num1 / num2}</p>`;
      }

      document.getElementById("result").innerHTML = output;
    }
  </script>
</body>
</html>
