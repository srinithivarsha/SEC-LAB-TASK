<!DOCTYPE html>
<html>
<head>
  <title>Validate Password Field</title>
</head>
<body>
  <h2>Validate Password Field</h2>

  <label>Enter Password:</label>
  <input type="password" id="passwordField">
  <button onclick="validatePassword()">Validate</button>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    function validatePassword() {
      let password = document.getElementById("passwordField").value;

      if (password === "") {
        document.getElementById("result").innerHTML =
          "<span style='color:red;'>Password cannot be empty.</span>";
        return;
      }

      
      let isLengthValid = password.length >= 8;
      let hasUppercase = /[A-Z]/.test(password);
      let hasNumber = /[0-9]/.test(password);

      if (isLengthValid && hasUppercase && hasNumber) {
        document.getElementById("result").innerHTML =
          `<span style='color:green;'>Password is valid ✅</span>`;
      } else {
        let errorMsg = "Password must have: <br>";
        if (!isLengthValid) errorMsg += "- At least 8 characters<br>";
        if (!hasUppercase) errorMsg += "- At least one uppercase letter<br>";
        if (!hasNumber) errorMsg += "- At least one number<br>";

        document.getElementById("result").innerHTML =
          `<span style='color:red;'>${errorMsg}</span>`;
      }
    }
  </script>
</body>
</html>
