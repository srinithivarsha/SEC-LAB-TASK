

<!DOCTYPE html>
<html>
<head>
  <title>Validate Name Field</title>
</head>
<body>
  <h2>Validate Name Field</h2>

  <label>Enter Name:</label>
  <input type="text" id="nameField">
  <button onclick="validateName()">Validate</button>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    function validateName() {
      let name = document.getElementById("nameField").value.trim();

      if (name === "") {
        document.getElementById("result").innerHTML =
          "<span style='color:red;'>Name cannot be empty.</span>";
        return;
      }

  
      let regex = /^[A-Za-z\s]+$/;

      if (regex.test(name)) {
        document.getElementById("result").innerHTML =
          `<span style='color:green;'>${name} is valid.</span>`;
      } else {
        document.getElementById("result").innerHTML =
          `<span style='color:red;'>${name} is invalid. Name can only contain letters and spaces.</span>`;
      }
    }
  </script>
</body>
</html>
