<!DOCTYPE html>
<html>
<head>
  <title>Number Guessing</title>
</head>
<body>
  <h2>Number Guessing Game</h2>

  <label>Enter your guess (1 - 100): </label>
  <input type="number" id="userInput" min="1" max="100">
  <button onclick="checkNumber()">Check</button>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    const predefinedNumber = 70;

    function checkNumber() {
      let userNum = parseInt(document.getElementById("userInput").value);

      if (isNaN(userNum)) {
        document.getElementById("result").innerHTML = "⚠️ Please enter a number.";
        return;
      }

      if (userNum < predefinedNumber) {
        document.getElementById("result").innerHTML = "Too Low!";
      } else if (userNum > predefinedNumber) {
        document.getElementById("result").innerHTML = "Too High!";
      } else {
        document.getElementById("result").innerHTML = "🎉 Correct!";
      }
    }
  </script>
</body>
</html>
